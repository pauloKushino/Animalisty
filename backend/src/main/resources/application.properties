# ============================================================
# AnimaListy - Application Configuration
# ============================================================

# Use 'dev' profile for H2 in-memory (no MySQL needed): -Dspring.profiles.active=dev

# Server
server.port=8080

# ============================================================
# Database - MySQL (default for local development)
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/animalisty?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:132309272206Pk$}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:404e635266556a586e3272357538782f413f4428472b4b6250645367566b5970337336763979244226452948404d6351655468576d5a7134743777217a25432a462}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ============================================================
# Cache (Caffeine)
# ============================================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=5m

# ============================================================
# CORS
# ============================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ============================================================
# Jikan API
# ============================================================
jikan.api.base-url=https://api.jikan.moe/v4

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
